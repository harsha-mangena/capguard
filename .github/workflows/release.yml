name: release

# Publishes to PyPI on a version tag via Trusted Publishing (OIDC, no API token).
# One-time setup: add capguard-runtime as a pending publisher on PyPI for this
# repo + workflow, and create a GitHub environment named "pypi".
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package and release tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,yaml,crypto,cloud]"
          python -m pip install --upgrade build twine
      - name: Verify tag matches package version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import sys

          pyproject = pathlib.Path("pyproject.toml").read_text()
          match = re.search(r'^version = "([^"]+)"$', pyproject, re.MULTILINE)
          if not match:
              raise SystemExit("pyproject.toml is missing a project version")
          version = match.group(1)
          tag = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          if tag != version:
              raise SystemExit(f"release tag v{tag} does not match package version {version}")
          sys.stdout.write(f"release version {version}\n")
          PY
      - name: Lint
        run: ruff check capguard tests examples
      - name: Tests
        run: pytest -q
      - name: Security benchmark gate
        run: capguard bench
      - name: Build sdist + wheel
        run: |
          python -m build
          python -m twine check dist/*
      - name: Smoke install wheel
        run: |
          python -m venv /tmp/capguard-release-smoke
          /tmp/capguard-release-smoke/bin/python -m pip install --upgrade pip
          /tmp/capguard-release-smoke/bin/python -m pip install dist/*.whl
          /tmp/capguard-release-smoke/bin/capguard version
          /tmp/capguard-release-smoke/bin/python - <<'PY'
          import importlib.metadata as md
          import capguard

          assert md.version("capguard-runtime") == capguard.__version__
          print(f"smoke ok {capguard.__version__}")
          PY
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/capguard-runtime/
    permissions:
      contents: read
      id-token: write   # required for PyPI Trusted Publishing
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
