name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev,yaml]"
      - name: Lint (ruff)
        run: ruff check capguard tests examples
      - name: Tests
        run: pytest -q
      - name: Security benchmark gate (fails on ASR regression / utility drop)
        run: capguard bench
      - name: MCP tool-poisoning self-scan
        run: capguard mcp-scan examples/sample_tools.json
