name: release

# Publishes to PyPI on a version tag via Trusted Publishing (OIDC, no API token).
# One-time setup: add capguard as a pending publisher on PyPI for this repo +
# workflow, and create a GitHub environment named "pypi".
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write   # required for PyPI Trusted Publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
